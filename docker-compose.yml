version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: pastetext-postgres
    environment:
      POSTGRES_DB: pastetext
      POSTGRES_USER: pastetext
      POSTGRES_PASSWORD: pastetext
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastetext"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pastetext-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pastetext-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      retries: 5

  paste-api:
    build: ./paste-api
    container_name: paste-api
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pastetext
      SPRING_DATASOURCE_USERNAME: pastetext
      SPRING_DATASOURCE_PASSWORD: pastetext
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_prod_32chars}

  paste-expiration:
    build: ./paste-expiration
    container_name: paste-expiration
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pastetext
      SPRING_DATASOURCE_USERNAME: pastetext
      SPRING_DATASOURCE_PASSWORD: pastetext
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  frontend:
    build: ./frontend
    container_name: pastetext-frontend
    ports:
      - "3000:80"
    depends_on: [paste-api]

volumes:
  postgres_data: