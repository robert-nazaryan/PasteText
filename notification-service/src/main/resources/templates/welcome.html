<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to PasteBin</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                <!-- Header -->
                <tr>
                    <td style="background-color:#1a1a2e;padding:32px 40px;">
                        <h1 style="margin:0;color:#ffffff;font-size:24px;letter-spacing:1px;">PasteBin</h1>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding:40px;">
                        <h2 style="margin:0 0 16px;color:#1a1a2e;font-size:22px;">
                            Welcome to PasteText!
                        </h2>
                        <p style="margin:0 0 8px;color:#888888;font-size:14px;" th:text="${email}">you@example.com</p>
                        <p style="margin:0 0 24px;color:#555555;font-size:15px;line-height:1.6;">
                            Your account is ready. Start sharing code snippets, notes, and more — instantly.
                        </p>
                        <table cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="border-radius:6px;background-color:#1a1a2e;">
                                    <a th:href="${loginUrl}"
                                       style="display:inline-block;padding:14px 32px;color:#ffffff;
                                              text-decoration:none;font-size:15px;font-weight:bold;">
                                        Go to PasteBin
                                    </a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="padding:24px 40px;background-color:#f9f9f9;border-top:1px solid #eeeeee;">
                        <p style="margin:0;color:#aaaaaa;font-size:12px;">
                            You received this email because you registered at PasteBin.
                            If you did not register, please ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
